name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache WASM Tools
        id: cache-wasm-tools
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/workloads
          key: ${{ runner.os }}-wasm-tools-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}

      - name: Install WASM Tools
        if: steps.cache-wasm-tools.outputs.cache-hit != 'true'
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore ContestJudging.slnx

      - name: Check Formatting
        run: dotnet format ContestJudging.slnx --verify-no-changes

      - name: Clean
        run: dotnet clean ContestJudging.slnx --configuration Release

      - name: Build
        # wasm-tools are required to link native SQLite assets even without AOT
        run: dotnet build ContestJudging.slnx --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test ContestJudging.slnx --configuration Release --no-build --verbosity normal

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: ./ --allow-no-lockfiles

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality-and-test, security-scan]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache WASM Tools
        id: cache-wasm-tools-deploy
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/workloads
          key: ${{ runner.os }}-wasm-tools-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}

      - name: Install WASM Tools
        if: steps.cache-wasm-tools-deploy.outputs.cache-hit != 'true'
        run: dotnet workload install wasm-tools

      - name: Publish Blazor WASM
        run: dotnet publish src/ContestJudging.Web/ContestJudging.Web.csproj -c Release -o release --nologo

      - name: Rewrite base href for GitHub Pages
        run: sed -i 's/<base href="\/" \/>/<base href="\/eoh-2026-judging\/" \/>/g' release/wwwroot/index.html

      # GitHub Pages doesn't support SPA routing well by default (returns 404 on refresh)
      # We'll copy index.html to 404.html as a common workaround
      - name: Fix SPA Routing for GitHub Pages
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
